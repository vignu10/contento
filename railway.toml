# Railway Deployment Configuration
# Using Nixpacks for automatic Next.js detection and build

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start:production"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "contento"

[services.source]
repo = "vignu10/contento"
branch = "main"

# Set these in Railway Variables tab (project-level):
# - DATABASE_URL (from your PostgreSQL service)
# - JWT_SECRET
# - OPENAI_API_KEY

[[services.variables]]
name = "NODE_ENV"
value = "production"

[[services.variables]]
name = "DATABASE_URL"

[[services.variables]]
name = "JWT_SECRET"

[[services.variables]]
name = "OPENAI_API_KEY"

[[services.variables]]
name = "NEXT_PUBLIC_APP_URL"
value = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
