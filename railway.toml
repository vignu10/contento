# Railway Deployment Configuration
# This configuration uses Dockerfile for consistent builds

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "contento"

[services.source]
repo = "vignu10/contento"
branch = "main"

[[services.variables]]
name = "NODE_ENV"
value = "production"

# Database - Set this in Railway dashboard (Variables tab)
[[services.variables]]
name = "DATABASE_URL"
value = "${{Postgres.DATABASE_URL}}"

# Redis - Optional for now, add Redis service later
# [[services.variables]]
# name = "REDIS_URL"
# value = "${{Redis.REDIS_URL}}"

# JWT Secret - Set this in Railway dashboard
[[services.variables]]
name = "JWT_SECRET"
value = "${{JWT_SECRET}}"

# OpenAI API Key - Set this in Railway dashboard
[[services.variables]]
name = "OPENAI_API_KEY"
value = "${{OPENAI_API_KEY}}"

[[services.variables]]
name = "NEXT_PUBLIC_APP_URL"
value = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
