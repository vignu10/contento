# Railway Deployment Configuration
# This configuration uses Railway's native Next.js builder (recommended)

[build]
# Auto-detect Next.js - no custom builder needed
# Railway will automatically detect Next.js from package.json

[deploy]
# Next.js uses a built-in server, no custom start command needed
# Railway handles this automatically

# Health check configuration
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
