# Railway Deployment Configuration
# This configuration uses Dockerfile for consistent builds

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start:production"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "contento"

[services.source]
repo = "vignu10/contento"
branch = "main"

[[services.variables]]
name = "NODE_ENV"
value = "production"

# Database from Railway PostgreSQL service
# Make sure service is named exactly "Postgres"
[[services.variables]]
name = "DATABASE_URL"
value = "${{Postgres.DATABASE_URL}}"

# Redis - Optional, add Redis service later and uncomment
# [[services.variables]]
# name = "REDIS_URL"
# value = "${{Redis.REDIS_URL}}"

# These should be set in Railway Variables tab (project-level)
[[services.variables]]
name = "JWT_SECRET"

[[services.variables]]
name = "OPENAI_API_KEY"

[[services.variables]]
name = "NEXT_PUBLIC_APP_URL"
value = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
